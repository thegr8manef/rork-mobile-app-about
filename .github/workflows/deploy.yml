# ╔══════════════════════════════════════════════════════════════════╗
# ║  NessnaUp — Build & Distribute (GitHub repo)                    ║
# ║                                                                  ║
# ║  This is the INTERNAL QA app pipeline.                           ║
# ║  For the PRODUCTION app (AttijariUp), see GitLab CI/CD.         ║
# ║  Code syncs from GitHub → GitLab via promote.yml workflow.       ║
# ║                                                                  ║
# ║  Triggers:                                                       ║
# ║    • Push to develop  → dev APK  → Firebase App Distribution     ║
# ║    • Push to main     → prod APK/AAB → Google Play internal      ║
# ║    • Manual dispatch  → choose environment + build type          ║
# ║                                                                  ║
# ║  Required secrets (GitHub → Settings → Secrets):                 ║
# ║    VERSIONING_TOKEN, ENV_DEVELOPMENT_FILE, ENV_PRODUCTION_FILE,  ║
# ║    KEYSTORE_BASE64, MYAPP_UPLOAD_KEY_ALIAS,                      ║
# ║    MYAPP_UPLOAD_STORE_PASSWORD, MYAPP_UPLOAD_KEY_PASSWORD,        ║
# ║    FIREBASE_APP_ID, FIREBASE_TOKEN,                              ║
# ║    GOOGLE_PLAY_SERVICE_ACCOUNT_JSON (for prod builds)            ║
# ╚══════════════════════════════════════════════════════════════════╝

name: "NessnaUp — Build & Distribute"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: development
        type: choice
        options:
          - development
          - production
      distribution:
        description: "Distribution target"
        required: true
        default: firebase
        type: choice
        options:
          - firebase
          - google-play
          - huawei-appgallery
      build_type:
        description: "Android build output"
        required: true
        default: apk
        type: choice
        options:
          - apk
          - aab
      skip_version_bump:
        description: "Skip automatic version bump"
        required: false
        default: false
        type: boolean

# ── Only one build per branch at a time ────────────────────
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# ── Resolve environment from trigger ──────────────────────
env:
  NODE_ENV: >-
    ${{
      github.event.inputs.environment
      || (github.ref == 'refs/heads/main' && 'production')
      || 'development'
    }}

jobs:
  # ═══════════════════════════════════════════════════════════
  # 1. VERSION BUMP
  # ═══════════════════════════════════════════════════════════
  version:
    name: "🏷️ Bump version"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_version_bump != 'true' }}
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_version_code: ${{ steps.bump.outputs.new_version_code }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.VERSIONING_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --legacy-peer-deps --production=false

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION_CODE=$(node -p "
            const [ma,mi,pa] = require('./package.json').version.split('.').map(Number);
            ma * 10000 + mi * 100 + pa
          ")
          echo "new_version=$NEW_VERSION"       >> "$GITHUB_OUTPUT"
          echo "new_version_code=$NEW_VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Commit & push version bump
        run: |
          git add package.json app.json android/app/build.gradle
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  # ═══════════════════════════════════════════════════════════
  # 2. READ VERSION (fallback when bump is skipped)
  # ═══════════════════════════════════════════════════════════
  read-version:
    name: "📖 Read current version"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_version_bump == 'true' }}
    outputs:
      new_version: ${{ steps.read.outputs.new_version }}
      new_version_code: ${{ steps.read.outputs.new_version_code }}

    steps:
      - uses: actions/checkout@v4

      - id: read
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION_CODE=$(node -p "
            const [ma,mi,pa] = require('./package.json').version.split('.').map(Number);
            ma * 10000 + mi * 100 + pa
          ")
          echo "new_version=$NEW_VERSION"       >> "$GITHUB_OUTPUT"
          echo "new_version_code=$NEW_VERSION_CODE" >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════
  # 3. ANDROID BUILD
  # ═══════════════════════════════════════════════════════════
  android:
    name: "🤖 Android (${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'development' }})"
    runs-on: ubuntu-latest
    needs: [version, read-version]
    # Run if either version OR read-version succeeded (the other will be skipped)
    if: |
      always() &&
      (needs.version.result == 'success' || needs.read-version.result == 'success')
    timeout-minutes: 45
    env:
      NODE_OPTIONS: "--max-old-space-size=2048"
      APP_VERSION: ${{ needs.version.outputs.new_version || needs.read-version.outputs.new_version }}
      APP_VERSION_CODE: ${{ needs.version.outputs.new_version_code || needs.read-version.outputs.new_version_code }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # ── Free disk space (prevent ENOSPC) ─────────────────
      - name: Free disk space
        run: |
          echo "=== Disk usage BEFORE cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk/25* /usr/local/lib/android/sdk/ndk/26* \
            /opt/ghc /usr/local/share/boost /usr/share/swift \
            /usr/local/lib/android/sdk/build-tools/33* /usr/local/lib/android/sdk/build-tools/34* \
            /usr/local/lib/android/sdk/platforms/android-3[0-4] \
            /usr/local/lib/android/sdk/system-images || true
          docker image prune -af || true
          sudo apt-get clean || true
          echo "=== Disk usage AFTER cleanup ==="
          df -h /

      # Pull the version-bump commit if it was made
      - name: Pull latest (after version bump)
        run: git pull --rebase origin ${{ github.ref_name }} || true

      - name: Log build info
        run: |
          echo "╔════════════════════════════════════════╗"
          echo "║  Environment : ${{ env.NODE_ENV }}"
          echo "║  Version     : ${{ env.APP_VERSION }}"
          echo "║  Version Code: ${{ env.APP_VERSION_CODE }}"
          echo "║  Build Type  : ${{ github.event.inputs.build_type || 'apk' }}"
          echo "║  Commit      : ${{ github.sha }}"
          echo "╚════════════════════════════════════════╝"

      # ── System setup ─────────────────────────────────────
      - name: Add swap space
        run: |
          if [ ! -f /swapfile ]; then
            sudo fallocate -l 8G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
          fi
          sudo swapon /swapfile || true

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Gradle caching ──────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps --production=false

      # ── Environment file ────────────────────────────────
      - name: Write env file
        run: |
          if [ "${{ env.NODE_ENV }}" = "production" ]; then
            echo "${{ secrets.ENV_PRODUCTION_FILE }}" | base64 -d > .env.production
            cp .env.production .env
          else
            echo "${{ secrets.ENV_DEVELOPMENT_FILE }}" | base64 -d > .env.development
            cp .env.development .env
          fi

      # ── Android SDK / signing ───────────────────────────
      - name: Setup Android SDK
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          # Install cmake version compatible with React Native
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"
          echo "cmake.dir=$ANDROID_SDK_ROOT/cmake/3.22.1" >> android/local.properties

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-key.jks

      - name: Configure signing
        run: |
          sed -i '/systemProp/d' android/gradle.properties || true
          cat >> android/gradle.properties << EOF
          MYAPP_UPLOAD_STORE_FILE=release-key.jks
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.MYAPP_UPLOAD_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.MYAPP_UPLOAD_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.MYAPP_UPLOAD_KEY_PASSWORD }}
          EOF

      - run: chmod +x android/gradlew

      # ── Clean ───────────────────────────────────────────
      - name: Clean previous build
        run: |
          cd android
          rm -rf app/build app/.cxx
          ./gradlew clean --no-daemon

      # ── Generate codegen artifacts ──────────────────────
      - name: Generate codegen artifacts
        run: |
          cd android
          ./gradlew generateCodegenArtifactsFromSchema --no-daemon -PreactNativeArchitectures=armeabi-v7a,arm64-v8a

      # ── Build ───────────────────────────────────────────
      # Firebase builds use previewRelease → includes Chucker for network inspection
      # Google Play builds use release → Chucker no-op (clean production build)
      - name: Build Android
        id: build
        run: |
          cd android

          BUILD_TYPE="${{ github.event.inputs.build_type || 'apk' }}"
          ENV_LABEL="${{ env.NODE_ENV }}"
          DISTRIBUTION="${{ github.event.inputs.distribution || 'firebase' }}"

          if [ "$DISTRIBUTION" = "google-play" ]; then
            # Google Play AAB (NO Chucker, minified, R8)
            ./gradlew bundleRelease --no-daemon -PreactNativeArchitectures=armeabi-v7a,arm64-v8a
            echo "artifact_path=android/app/build/outputs/bundle/release/app-release.aab" >> $GITHUB_OUTPUT
            echo "artifact_name=nessnaUp-${{ env.APP_VERSION }}-googleplay.aab" >> $GITHUB_OUTPUT
            echo "distribution=google-play" >> $GITHUB_OUTPUT
          elif [ "$DISTRIBUTION" = "huawei-appgallery" ]; then
            # Huawei AppGallery APK (NO Chucker, minified, R8)
            ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=armeabi-v7a,arm64-v8a
            echo "artifact_path=android/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "artifact_name=nessnaUp-${{ env.APP_VERSION }}-huawei.apk" >> $GITHUB_OUTPUT
            echo "distribution=huawei-appgallery" >> $GITHUB_OUTPUT
          else
            # Firebase APK (WITH Chucker for network debugging)
            ./gradlew assemblePreviewRelease --no-daemon -PreactNativeArchitectures=armeabi-v7a,arm64-v8a
            echo "artifact_path=android/app/build/outputs/apk/previewRelease/app-previewRelease.apk" >> $GITHUB_OUTPUT
            echo "artifact_name=nessnaUp-${{ env.APP_VERSION }}-${ENV_LABEL}-firebase.apk" >> $GITHUB_OUTPUT
            echo "distribution=firebase" >> $GITHUB_OUTPUT
          fi

          echo "env_label=$ENV_LABEL" >> $GITHUB_OUTPUT

      # ── Upload artifact ─────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.artifact_name }}
          path: ${{ steps.build.outputs.artifact_path }}
          retention-days: 30

      # ── Distribution: Firebase App Distribution ─────────
      - name: Firebase App Distribution
        if: steps.build.outputs.distribution == 'firebase'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: internal-testers-nessnaUp
          file: ${{ steps.build.outputs.artifact_path }}
          releaseNotes: |
            🚀 NessnaUp ${{ env.APP_VERSION }} (${{ env.NODE_ENV }})
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

      # ── Distribution: Google Play ───────────────────────
      # Closed testing track "app-test" with "Digital Center" tester group
      # (tester list configured in Google Play Console → Closed testing → Manage track → Testers)
      - name: Google Play — closed testing (Digital Center)
        if: steps.build.outputs.distribution == 'google-play'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: tn.attijariup.plus
          releaseFiles: ${{ steps.build.outputs.artifact_path }}
          track: app-test
          status: completed
          releaseName: "nessnaUp-${{ env.APP_VERSION }}"
          changesNotSentForReview: true

      # ── Distribution: Huawei AppGallery ─────────────────
      # Required secrets: HUAWEI_SERVICE_ACCOUNT_JSON (base64-encoded), HUAWEI_APP_ID
      # Uses JWT service account auth (not deprecated API client)
      - name: Huawei AppGallery — internal testing
        if: steps.build.outputs.distribution == 'huawei-appgallery'
        run: |
          # Install PyJWT for reliable PS256 JWT generation
          pip3 install PyJWT cryptography --quiet

          # Decode service account JSON
          echo "${{ secrets.HUAWEI_SERVICE_ACCOUNT_JSON }}" | base64 -d > /tmp/huawei-sa.json

          # Generate JWT and exchange for access token using Python
          ACCESS_TOKEN=$(python3 -c "
          import jwt, json, time, urllib.request, urllib.parse

          with open('/tmp/huawei-sa.json') as f:
              sa = json.load(f)

          now = int(time.time())
          token = jwt.encode(
              {'iss': str(sa['sub_account']), 'iat': now, 'exp': now + 3600, 'aud': sa['token_uri']},
              sa['private_key'],
              algorithm='PS256',
              headers={'kid': sa['key_id']}
          )

          # Exchange JWT for access token
          data = urllib.parse.urlencode({
              'grant_type': 'urn:ietf:params:oauth:grant-type:jwt-bearer',
              'assertion': token
          }).encode()
          req = urllib.request.Request(sa['token_uri'], data=data, headers={'Content-Type': 'application/x-www-form-urlencoded'})
          resp = json.loads(urllib.request.urlopen(req).read())
          if 'access_token' not in resp:
              raise Exception(f'Failed to get access token: {resp}')
          print(resp['access_token'])
          ")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Failed to get access token"
            exit 1
          fi

          HUAWEI_APP_ID="${{ secrets.HUAWEI_APP_ID }}"
          APK_PATH="${{ steps.build.outputs.artifact_path }}"

          # Get upload URL
          UPLOAD_URL_RESPONSE=$(curl -s -X GET \
            "https://connect-api.cloud.huawei.com/api/publish/v2/upload-url/for-obs?appId=$HUAWEI_APP_ID&suffix=apk" \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          UPLOAD_AUTH_CODE=$(echo "$UPLOAD_URL_RESPONSE" | jq -r '.authCode')
          UPLOAD_URL=$(echo "$UPLOAD_URL_RESPONSE" | jq -r '.uploadUrl')

          if [ "$UPLOAD_URL" = "null" ] || [ -z "$UPLOAD_URL" ]; then
            echo "❌ Failed to get upload URL"
            echo "$UPLOAD_URL_RESPONSE"
            exit 1
          fi

          # Upload APK
          UPLOAD_RESPONSE=$(curl -s -X POST "$UPLOAD_URL" \
            -H "Accept: application/json" \
            -F "file=@$APK_PATH" \
            -F "authCode=$UPLOAD_AUTH_CODE" \
            -F "fileCount=1")

          FILE_DEST_URL=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.UploadFileRsp.fileInfoList[0].fileDestUlr')

          if [ "$FILE_DEST_URL" = "null" ] || [ -z "$FILE_DEST_URL" ]; then
            echo "❌ Failed to upload APK"
            echo "$UPLOAD_RESPONSE"
            exit 1
          fi

          # Update app file info
          curl -s -X PUT \
            "https://connect-api.cloud.huawei.com/api/publish/v2/app-file-info?appId=$HUAWEI_APP_ID" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"fileType": 5, "files": [{"fileName": "app-release.apk", "fileDestUrl": "'"$FILE_DEST_URL"'"}]}'

          echo "✅ APK uploaded to Huawei AppGallery (draft — assign to internal testing in console)"

          # Cleanup
          rm -f /tmp/huawei-sa.json /tmp/huawei-pk.pem

      # ── Cleanup keystore ────────────────────────────────
      - name: Remove keystore
        if: always()
        run: rm -f android/app/release-key.jks

